<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Seu Perfil</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="container">

    <h1 id="titulo"></h1>

    <img id="imagem" src="">

    <p id="texto"></p>

    <button onclick="copiarResultado()">
      Compartilhar Resultado
    </button>

    <br>

    <a href="todos-resultados.html"
       class="botao">

      Visualizar todos os resultados possíveis

    </a>

    <a href="index.html"
       class="botao">

      Refazer Quiz

    </a>

  </div>

  <script>

    const params =
      new URLSearchParams(window.location.search);

    const classe =
      params.get("classe");

    const titulo =
      document.getElementById("titulo");

    const imagem =
      document.getElementById("imagem");

    const texto =
      document.getElementById("texto");



    if (classe === "Agroboy") {

      titulo.innerText = "Agroboy";

      imagem.src = "imagens/H1.webp";

      texto.innerText =
      "Você é um verdadeiro MACHÃO, aquele cara que exala testosterona.\nUm Homem com H maiúsculo que caça a própria comida, troca a lampada, acorda antes do cantar do galo.\nUm exemplo de cromossoma YY";
    }

    else if (classe === "Heterotop") {

      titulo.innerText = "Heterotop";

      imagem.src = "imagens/H2.jpg";

      texto.innerText =
      "Minhas disculpas, mas você é um 'Bostinha', quer dizer, 'Betinha'.\nUm verdadero RedPill, que nenhuma mulher vai querer.\nCom certeza vc é calvo, feio e baixinho";
    }

    else if (classe === "Normal") {

      titulo.innerText = "Hétero Legal";

      imagem.src = "imagens/H3.webp";

      texto.innerText =
      "Você é um hétero progressista, que defende as causas.\nTrata as mulheres e os coloridinhos muito bem.\nA sociêdade precisa de mais pessoas como você";
    }

    else if (classe === "Afeminado") {

      titulo.innerText = "Hétero Afeminado";

      imagem.src = "imagens/H4.jpg";

      texto.innerText =
      "Mona, você é quase uma mulher!\nÉ incrível saber que vc não gosta de uma Neka Grandona!\nSua esposa vai ficar feliz em te contar os babados enquanto vc pinta as unhas dela.";
    }

    else if (classe === "Incel") {

      titulo.innerText = "Incel";

      imagem.src = "imagens/H5.jpg";

      texto.innerText =
      "Que cara sem sal, na moral.\nO famoso Celibatário involuntário.\nVocê é uma vergonha para Charles Darwin, conservando todo material genético para sí.";
    }

    else if (classe === "Bi") {

      titulo.innerText = "Um verdadeiro Bi";

      imagem.src = "imagens/H6.png";

      texto.innerText =
      "Você é o verdadeiro sentido de 'Tanto Faz'.\nHomem, Mulher, Gay, Lenhador... É dentro!\nNem a mãe do amigo escapa.";
    }

    else if (classe === "BiFestinha") {

      titulo.innerText = "BiFestinha";

      imagem.src = "imagens/H7.webp";

      texto.innerText =
      "Você é um mentiroso!\nPega homem só em festa.\nÉ só uma fase, depois concerta.\nPega homem pq tá na moda";
    }

    else if (classe === "Ativo") {

      titulo.innerText = "Ativo Real";

      imagem.src = "imagens/H8.jpg";

      texto.innerText =
      "Você é um verdadeiro gay ativo.\nPra ser hétero só faltou gostar de mulher.\nVocê mal escuta pop, e treina todo dia costas e peito.";
    }

    else if (classe === "Versátil+Ativo") {

      titulo.innerText = "Versátil Ativo";

      imagem.src = "imagens/H8.jpg";

      texto.innerText =
      "Finge que é só ativo, mas de vez em quando vc gosta de...\nVc é legal, curte um pop e uma eletrónica, mas de vez em quando escuta um sertanejo.";
    }

    else if (classe === "Versátil") {

      titulo.innerText = "Versátil";

      imagem.src = "imagens/H9.jpg";

      texto.innerText =
      "Você é o Bi dos Gays.\nLiteralmente tanto faz pra vc:\npatricinha, lenhador, gay padrão...\nSobre tua aparência, vc é o mais padrão possível.\nVai na Smart, ama treinar superiores, ama postar aquele 'De hj foi pago'.";
    }

    else if (classe === "Versátil+Passivo") {

      titulo.innerText = "Versátil Passivo";

      imagem.src = "imagens/H10.jpg";

      texto.innerText =
      "Mentirosa!\nVc ama falar que é Ativona mas chega já empinando tudo.\nSabemos que no off vc treina glúteo e como fazer quadradinho.\nE para de fingir que vc não gosta da Taylor.";
    }

    else if (classe === "Passivo") {

      titulo.innerText = "Passivo";

      imagem.src = "imagens/H11.jpg";

      texto.innerText =
      "O verdadeiro amigo de toda mulher.\nTu ama pop e não esconde.\nTem muita energia, topa qualquer rolê e alegra o dia de todo mundo.\nA Smart te ama.\nTodo dia é dia de perna.";
    }

    else {

      titulo.innerText = "Passiva Tóxica";

      imagem.src = "imagens/H12.png";

      texto.innerText =
      "Mona, que bixa chata! PQP!\nBum bum empinado encostado na nuca.\nNinguém te suporta!\nVai na academia só pra ir na esteira e treinar glúteo, mas não tem resultado.\nA mais genérica: Taylor, Sabrina e Demi.";
    }



    function copiarResultado() {

      const textoCompartilhar =

        "Eu tirei '" +

        document.getElementById("titulo").innerText +

        "' nesse quiz 😭\n\n" +

        window.location.href;

      navigator.clipboard.writeText(textoCompartilhar);

      alert("Resultado copiado!");
    }

  </script>

</body>

</html>
