<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quiz Adaptativo</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <!-- TELA INICIAL -->

    <div id="start-screen">

      <h1>Quiz Adaptativo</h1>

      <input
        type="text"
        id="name"
        placeholder="Seu nome"
      >

      <input
        type="number"
        id="age"
        placeholder="Sua idade"
      >

      <input
        type="text"
        id="course"
        placeholder="Seu curso"
      >
      <select id="gender">

        <option value="">
          Selecione seu gênero
        </option>

        <option value="Homem">
          Homem
        </option>

        <option value="Mulher">
          Mulher
        </option>

        <option value="Não Binário">
          Não Binário
        </option>

        <option value="Trans">
          Trans
        </option>

        <option value="Politreco">
          Politévico
        </option>

        <option value="Pokemon">
          Pókemon
        </option>

        <option value="Batman">
          Batman
        </option>

        <option value="NAND">
          Uma porta NAND de um FlipFlop usado num contador binário
        </option>

        <option value="Prefiro não comentar">
          Prefiro não comentar
        </option>

      </select>

      <button onclick="startQuiz()">
        Começar Quiz
      </button>

    </div>



    <!-- QUIZ -->

    <div id="quiz-screen" class="hidden">

      <div class="progress">

        <div
          class="progress-bar"
          id="progress-bar"
        ></div>

      </div>

      <h2 id="question"></h2>

      <img
        id="question-image"
        src=""
        alt="Imagem da pergunta"
      >

      <div
        id="answers"
        class="answers"
      ></div>

    </div>



    <!-- RESULTADO -->

    <div id="result-screen" class="hidden">

      <h1>Resultado Final</h1>

      <div class="result-box">

        <p id="final-name"></p>

        <p id="final-level"></p>

        <p id="final-score"></p>

        <p id="final-total"></p>

      </div>

      <h2>Resultado da Primeira Fase</h2>

      <canvas id="graficoNivel"></canvas>

      <br><br>

      <h2>Subclassificação</h2>

      <canvas id="graficoClasse"></canvas>

      <br><br>

      <a
        id="resultado-link"
        class="botao"
        href="#"
      >
        Ver meu resultado completo
      </a>

      <br><br>

      <a
        href="todos-resultados.html"
        class="botao"
      >
        Ver todos os resultados possíveis
      </a>

      <br><br>

      <button onclick="location.reload()">
        Refazer Quiz
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
